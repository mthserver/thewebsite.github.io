/* ОСНОВНАЯ СЕТКА */

    grid-template-columns: 40% 60%;

}

/* ЛЕВАЯ ЧАСТЬ */
.left {
    padding: 20px;
    box-sizing: border-box;
}

    margin-bottom: 20px;
}

#lesson-name {
    font-size: 40px;

}

#day-name {
    text-align: center;
    margin-bottom: 10px;
    font-size: 20px;
}

/* ТАБЛИЦА */
table {
    border-collapse: collapse;
    width: 100%;
    font-size: 18px;
}

td, th {
    border-bottom: 1px solid #333;
    padding: 6px 8px;
    text-align: left;
}

/* ПРАВАЯ ЧАСТЬ (ВИДЕО) */
.right {
    width: 100%;
    height: 100%;
}

#main-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* СКРОЛЛ ЕСЛИ МНОГО */
#lesson-table-output {
    max-height: 65vh;
    overflow-y: auto;
}

function digitalClock() {
    let date = new Date();
    let h = String(date.getHours()).padStart(2, '0');
    let m = String(date.getMinutes()).padStart(2, '0');
    let s = String(date.getSeconds()).padStart(2, '0');

    document.getElementById("id_clock").innerHTML = h + ":" + m + ":" + s;
    setTimeout(digitalClock, 1000);
}

/* ДНИ */
const dayNames = ["", "Понедельник", "Вторник", "Среда", "Четверг", "Пятница"];

function getCurrentDay() {
    let d = new Date().getDay();
    return d === 0 ? null : d;
}

/* ВРЕМЯ */
function toMinutes(t) {
    let [h, m] = t.split(":").map(Number);
    return h * 60 + m;
}

function getCurrentLessonNumber() {
    let now = new Date();
    let minutes = now.getHours() * 60 + now.getMinutes();

    for (let les of lessons) {
        if (minutes >= toMinutes(les.start) && minutes < toMinutes(les.end)) {
            return les.num;
        }
    }
    return null;
}

/* ОБНОВЛЕНИЕ */
function updateLessonInfo() {
    let num = getCurrentLessonNumber();
    let day = getCurrentDay();

    if (!num || !day || !weeklySchedule[day]) {
        document.getElementById("lesson-name").innerText = "Нет уроков";
        document.getElementById("lesson-table-output").innerHTML = "";
        document.getElementById("day-name").innerText = "";
        return;
    }

    document.getElementById("lesson-name").innerText = "Урок " + num;
    document.getElementById("day-name").innerText = dayNames[day];

    let html = "<table><tr><th>Класс</th><th>Предмет</th></tr>";

    const todaySchedule = weeklySchedule[day];

    for (let cls in todaySchedule) {
        let subject = todaySchedule[cls][num - 1];

        if (!subject || subject.trim() === "") continue;

        html += `<tr><td><b>${cls}</b></td><td>${subject}</td></tr>`;
    }

    html += "</table>";

    document.getElementById("lesson-table-output").innerHTML = html;
}

setInterval(updateLessonInfo, 10000);

/* ВИДЕО */
const videoSources = [

];

let videoIndex = 0;

function loadVideo() {
    const video = document.getElementById('main-video');
    video.innerHTML = `<source src="${videoSources[videoIndex].src}" type="${videoSources[videoIndex].type}">`;
    video.load();
    video.play();
}
